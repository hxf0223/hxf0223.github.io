"$schema" = 'https://starship.rs/config-schema.json'

# Single-line prompt: prefix info then cursor on same line (traditional bash style)
format = """\
$directory\
$git_branch\
$git_status\
$character\
"""

add_newline = false

# --- Directory: show only the current directory name ---
[directory]
format = "[ $path ]($style)"
truncation_length = 1
truncation_symbol = ""

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

# --- Git: branch + modification status only ---
[git_branch]
symbol = " "
format = '[ $symbol $branch ]($style)'

[git_status]
format = '[$all_status$ahead_behind ]($style)'

# --- Disable everything else ---
